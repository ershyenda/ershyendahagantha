    <!-- LOGIN SECTION -->
    <div class="d-flex align-items-center justify-content-center" style="min-height:90vh;">

        <div class="card border-0 shadow-lg p-4" style="max-width:420px; width:100%; border-radius:16px;">

            <!-- TITLE -->
            <div class="text-center mb-4">
                <h3 class="fw-bold" style="font-family:'Playfair Display', serif; color:#0f2240;">
                    Selamat Datang
                </h3>
                <p class="text-muted small">
                    Masuk untuk melanjutkan ke LiberaSpace
                </p>
            </div>

            <!-- FORM -->
            <form>
                <div class="mb-3">
                    <label class="form-label small">Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" class="form-control" placeholder="Masukkan email" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control" placeholder="Masukkan password" required>
                    </div>
                </div>

                <!-- <div class="d-flex justify-content-between mb-3 small">
                    <div>
                        <input type="checkbox" id="remember">
                        <label for="remember">Ingat saya</label>
                    </div>
                    <a href="#" class="text-decoration-none" style="color:#c9a84c;">Lupa password?</a>
                </div> -->

                <button type="submit" class="btn w-100 fw-bold text-uppercase"
                    style="background:#c9a84c; color:#0f2240;">
                    Login
                </button>
            </form>
