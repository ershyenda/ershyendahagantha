
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Anggota - LiberaSpace</title>

</head>
<body>

<header>
    <div class="logo">
        <h1>LiberaSpace</h1>
        <p>Ruang Literasi Digital Sekolah</p>
    </div>

    <nav>
        <a href="index.html">Beranda</a>
        <a href="profil.html">Profil</a>
        <a href="katalog.html">Katalog</a>
        <a href="kontak.html">Kontak</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<main style="text-align:center; padding:40px;">
    <h2>Login Anggota</h2>

    <form onsubmit="return loginUser()">
        <input type="text" id="username" placeholder="Username" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <button type="submit">Login</button>
    </form>

    <p id="pesan" style="color:red;"></p>
</main>

<script>
function loginUser() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if(user === "anggota" && pass === "12345") {
        alert("Login berhasil!");
        return false;
    } else {
        document.getElementById("pesan").innerHTML = "Username atau Password salah!";
        return false;
    }
}
</script>

<footer>

</footer>

</body>
</html>
